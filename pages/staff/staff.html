<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PILATEA - Panel de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../scss/main.css">
</head>
<body class="bg-staff">

    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="../../assets/img/logo-pilatea-removebg-preview.png" alt="PILATEA Logo" class="nav-logo">
            </div>
            <div class="nav-actions">
                <a href="../../index.html" class="btn-link">Ver Web</a>
                <button id="btnLogout" class="btn-principal">Cerrar Sesión</button>
            </div>
        </nav>
    </header>

    <main class="container-admin">
        <header class="admin-header">
            <h1>Gestión del Estudio</h1>
            <p>Desde aquí puedes crear nuevos horarios y gestionar a tus alumnos.</p>
        </header>

        <div class="admin-grid">
            <section class="admin-card">
                <h3>Publicar Nueva Clase</h3>
                <form id="createClassForm" class="staff-form">
                    <div class="form-group">
                        <label>Tipo de Disciplina</label>
                        <select id="classType" required>
                            <option value="Pilates Reformer">Pilates Reformer</option>
                            <option value="Hiit Barre">Hiit Barre</option>
                            <option value="Yoga">Yoga</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Instructor/a</label>
                        <input type="text" id="classInstructor" placeholder="Nombre del profe" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Fecha</label>
                            <input type="date" id="classDate" required>
                        </div>
                        <div class="form-group">
                            <label>Hora</label>
                            <input type="time" id="classTime" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Cupos Máximos</label>
                        <input type="number" id="classCapacity" value="8" min="1" required>
                    </div>
                    <button type="submit" class="btn-principal">Crear Clase</button>
                </form>
            </section>

            <section class="admin-card">
                <h3>Próximas Acciones</h3>
                <div class="action-buttons">
                    <button class="btn-secundario">Cargar Créditos</button>
                    <button class="btn-secundario">Ver Lista de Alumnos</button>
                </div>
                <hr>
                <div id="statusMessage" class="status-msg"></div>
            </section>
        </div>
    </main>

    <script type="module" src="../../js/main.js"></script>
</body>
</html>
